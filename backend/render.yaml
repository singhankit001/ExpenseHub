services:
  - type: web
    name: expense-tracker-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # User must provide their hosted PostgreSQL connection URL
      - key: JWT_SECRET
        generateValue: true # Securely auto-generated by Render
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
